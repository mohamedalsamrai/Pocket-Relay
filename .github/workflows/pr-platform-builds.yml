name: PR Verification

on:
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-platform-builds-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.4
  REGRESSION_TOTAL_SHARDS: 3
  ANDROID_TARGET_PLATFORM: android-arm64

jobs:
  changes:
    name: Detect verification scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}

    steps:
      - name: Detect markdown-only PRs
        id: scope
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'pull_request') {
              core.setOutput('docs_only', 'false');
              core.info('Non-PR run: full verification remains enabled.');
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );
            const changedFilesCount = context.payload.pull_request.changed_files;
            const hasCompleteFileList =
              Number.isInteger(changedFilesCount) &&
              files.length === changedFilesCount;

            const isDocsPath = (name) => {
              const lowered = name.toLowerCase();
              return lowered === 'agents.md' || lowered.endsWith('.md');
            };

            const docsOnly =
              hasCompleteFileList &&
              files.length > 0 &&
              files.every((file) =>
                [file.filename, file.previous_filename]
                  .filter(Boolean)
                  .every(isDocsPath),
              );

            core.info(
              `Changed files (${files.length}): ${files.map((file) => file.filename).join(', ')}`,
            );
            core.info(`pull_request.changed_files=${changedFilesCount}`);
            if (!hasCompleteFileList) {
              core.warning(
                'Changed-file listing may be incomplete; keeping full verification enabled.',
              );
            }
            core.info(`docs_only=${docsOnly}`);
            core.setOutput('docs_only', docsOnly ? 'true' : 'false');

  regression_shards:
    name: Regression shard ${{ matrix.shard_label }}
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
            shard_label: 1/3
          - shard_index: 1
            shard_label: 2/3
          - shard_index: 2
            shard_label: 3/3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Run Flutter regression shard
        run: >
          flutter test
          --no-pub
          --total-shards ${{ env.REGRESSION_TOTAL_SHARDS }}
          --shard-index ${{ matrix.shard_index }}

  regression:
    name: Regression tests
    needs:
      - changes
      - regression_shards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}

    steps:
      - name: Skip regression shards for markdown-only PRs
        if: ${{ needs.changes.result == 'success' && needs.changes.outputs.docs_only == 'true' }}
        run: |
          echo "Markdown-only PR: regression shards intentionally skipped."

      - name: Fail when verification scope detection fails
        if: ${{ needs.changes.result != 'success' }}
        run: |
          echo "Verification-scope detection failed."
          exit 1

      - name: Fail when any regression shard fails
        if: ${{ needs.changes.outputs.docs_only != 'true' && needs.regression_shards.result != 'success' }}
        run: |
          echo "At least one regression shard failed."
          exit 1

      - name: Confirm all regression shards passed
        if: ${{ needs.changes.result == 'success' && needs.changes.outputs.docs_only != 'true' && needs.regression_shards.result == 'success' }}
        run: |
          echo "All regression shards passed."

  android:
    name: Android debug APK (app flavor)
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle caching
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Build Android debug APK for the app flavor
        run: >
          flutter build apk
          --debug
          --flavor app
          --target-platform ${{ env.ANDROID_TARGET_PLATFORM }}
          --no-pub

  ios:
    name: iOS simulator debug build
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      # Use a simulator build here so CI proves the Xcode/Flutter iOS path
      # without conflating this workflow with the separately tracked device-side
      # native-assets problem in issue #118.
      - name: Build iOS debug simulator app
        run: flutter build ios --debug --simulator --no-pub

  linux:
    name: Linux debug bundle
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux desktop build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang cmake libgtk-3-dev libsecret-1-dev ninja-build pkg-config

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Build Linux debug bundle
        run: flutter build linux --debug --no-pub

  macos:
    name: macOS debug app
    needs: changes
    if: ${{ always() && (needs.changes.result != 'success' || needs.changes.outputs.docs_only != 'true') }}
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Build macOS debug app
        run: flutter build macos --debug --no-pub
