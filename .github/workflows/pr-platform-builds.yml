name: PR Platform Builds

on:
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-platform-builds-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.4

jobs:
  android:
    name: Android debug APK (app flavor)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Build Android debug APK for the app flavor
        run: flutter build apk --debug --flavor app

  ios:
    name: iOS simulator debug build
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      # Use a simulator build here so CI proves the Xcode/Flutter iOS path
      # without conflating this workflow with the separately tracked device-side
      # native-assets problem in issue #118.
      - name: Build iOS debug simulator app
        run: flutter build ios --debug --simulator

  linux:
    name: Linux debug bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux desktop build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang cmake libgtk-3-dev ninja-build pkg-config

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Build Linux debug bundle
        run: flutter build linux --debug

  macos:
    name: macOS debug app
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Dart and Flutter packages
        run: flutter pub get

      - name: Build macOS debug app
        run: flutter build macos --debug
